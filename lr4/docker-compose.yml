services:
  app1:
    build: .
    environment:
      NODE_ID: "1"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\")"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app2:
    build: .
    environment:
      NODE_ID: "2"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\")"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app3:
    build: .
    environment:
      NODE_ID: "3"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\")"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
      app3:
        condition: service_healthy
